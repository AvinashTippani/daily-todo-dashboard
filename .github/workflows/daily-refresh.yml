name: Daily To-Do Refresh

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC, Mon–Fri
    - cron: "30 2 * * 1-5"
  workflow_dispatch:   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write      # needed to commit index.html and todos.json back to repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ATLASSIAN_EMAIL:    ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_SITE:     ${{ secrets.ATLASSIAN_SITE }}
          MS_TENANT_ID:       ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:       ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:   ${{ secrets.MS_CLIENT_SECRET }}
          MS_USER_ID:         ${{ secrets.MS_USER_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/main.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/todos.json
          git diff --cached --quiet || git commit -m "chore: refresh to-do dashboard [$(date +'%Y-%m-%d')]"
          git push
